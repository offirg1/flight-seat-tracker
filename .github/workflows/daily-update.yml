name: Daily seat snapshot

on:
  schedule:
    - cron: "0 13 * * *" # 6:00 AM Pacific (13:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch seat availability
        run: node scripts/fetch-seats.mjs
        env:
          AMADEUS_API_KEY: ${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
          AMADEUS_ENV: ${{ vars.AMADEUS_ENV || 'test' }}

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "Seat snapshot $(date -u +%F)" || echo "No changes to commit"
          git push
